services:
  app:
    build: .
    container_name: ccenter_news
    env_file:
      - .env
    ports:
      - "5050:5050"
    networks:
      - news_ntwrk
    environment:
      - TZ=Asia/Tashkent
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1111
      POSTGRES_DB: ccenter_news
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news_ntwrk

networks:
  news_ntwrk:
    external: true

volumes:
  postgres_data:
    driver: local